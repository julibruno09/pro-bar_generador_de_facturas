<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas - Pro-bar</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <div class="container">
        <section class="form-section no-print">
            <h2>Ingresar Datos de la Venta</h2>
            <form id="facturaForm">
                <label>Nombre del Cliente:</label>
                <input type="text" id="clienteNombre" required>

                <label>Email del Cliente:</label>
                <input type="email" id="clienteEmail" required>

                <label>Fecha de la Operación:</label>
                <input type="date" id="fechaOperacion" required>

                <div class="productos-grid">
                    <div>
                        <label>Cantidad Avena:</label>
                        <input type="number" id="cantAvena" value="0" min="0">
                        <label>Precio Unitario Avena ($):</label>
                        <input type="number" id="precioAvena" value="1500" min="0">
                    </div>
                    <div>
                        <label>Cantidad Quinoa Pop:</label>
                        <input type="number" id="cantQuinoa" value="1800" min="0">
                        <label>Precio Unitario Quinoa ($):</label>
                        <input type="number" id="precioQuinoa" value="1400" min="0">
                    </div>
                </div>

                <label>Método de Pago:</label>
                <select id="metodoPago">
                    <option value="Contado">Contado</option>
                    <option value="Cuenta Corriente">Cuenta Corriente</option>
                </select>

                <button type="button" onclick="generarFactura()">Generar Factura</button>
            </form>
        </section>

        <section class="invoice-section" id="facturaVista">
            <div class="invoice-header">
                <div class="empresa-logo">
                    <img src="img/logo.png" alt="Logo" onerror="this.style.display='none';">
                    <h3>Pro-bar</h3>
                </div>
                <div class="empresa-datos">
                    <p><strong>Teléfono:</strong> +54 11 2174-7888</p>
                    <p><strong>Instagram:</strong> @probar.oficial</p>
                    <p><strong>Fecha:</strong> <span id="facturaFecha">--/--/----</span></p>
                </div>
            </div>

            <hr>

            <div class="invoice-cliente">
                <h4>Datos del Cliente</h4>
                <p><strong>Nombre:</strong> <span id="facturaCliente">---------</span></p>
                <p><strong>Email:</strong> <span id="facturaEmail">---------</span></p>
                <p><strong>Condición de Pago:</strong> <span id="facturaPago">---------</span></p>
            </div>

            <table class="invoice-table">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio Unitario</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="facturaDetalle">
                    </tbody>
            </table>

            <div class="invoice-total">
                <h3>Total a Pagar: $<span id="facturaTotal">0.00</span></h3>
            </div>

            <div class="invoice-actions no-print">
                <button class="btn-email" onclick="enviarPorMail()">📧 Enviar por Mail</button>
                <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
            </div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
